      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], { type: "application/json" });
    const manifestUrl = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestUrl;
    document.head.appendChild(link);
  </script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'training-hq-v1';
        const URLS  = [self.location.href];
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return res;
            }))
          );
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl  = URL.createObjectURL(swBlob);
      window.addEventListener('load', () => navigator.serviceWorker.register(swUrl));
    }
  </script>

function WorkoutDetail({plan, accentColor}) {
  const [done, setDone] = useState({});
  const toggle = i => setDone(p => ({...p,[i]:!p[i]}));
  const allDone = plan.exercises.length > 0 && plan.exercises.every((_,i) => done[i]);
  return (
    <div style={{background:"#0a0a12",border:`1px solid ${accentColor}44`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"14px 16px",marginBottom:4}}>
      <div style={{fontSize:9,letterSpacing:2,color:accentColor,marginBottom:4}}>{plan.label.toUpperCase()}</div>
      <div style={{fontSize:10,color:"#555",marginBottom:14,fontStyle:"italic"}}>{plan.note}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 40px 60px",gap:"0 8px",paddingBottom:6}}>

        <div style={{fontSize:9,letterSpacing:2,color:"#333",textAlign:"center"}}>SETS</div>
        <div style={{fontSize:9,letterSpacing:2,color:"#333",textAlign:"center"}}>REPS</div>
      </div>
      {plan.exercises.map((ex,i) => (
        <div key={i} className={`ex-row${done[i]?" done":""}`} onClick={() => toggle(i)}>
          <div>
            <div style={{fontSize:13,color:"#ddd",textDecoration:done[i]?"line-through":"none"}}>{ex.name}</div>
            {ex.note ? <div style={{fontSize:10,color:"#444",marginTop:2}}>{ex.note}</div> : null}

          <div style={{fontSize:14,color:"#999",textAlign:"center",alignSelf:"center"}}>{ex.reps}</div>

                      const c    = typeColors[s.type];
                      const plan = s.type==="lift" ? workoutKey(activeWeek,s.label) : null;
                      const key  = `${activeWeek}-${day}-${si}`;
                      const open = expandedLift === key;
                      return (
                        <div key={si}>
                          <div className={`pill${plan?" lift-pill":""}`} style={{background:c.bg,borderLeftColor:c.accent}}
                            onClick={() => plan && setExpandedLift(open?null:key)}>
                            <span style={{fontSize:18,flexShrink:0}}>{typeEmoji[s.type]}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:500,color:"#ddd"}}>{s.label}</div>
                              <div style={{fontSize:10,color:"#555",marginTop:2,letterSpacing:1}}>{s.sub}</div>
                            </div>
                            {plan && <div style={{fontSize:10,color:c.accent,flexShrink:0}}>{open?"▲":"▼ VIEW"}</div>}
                          </div>
                          {plan && open && <WorkoutDetail plan={plan} accentColor={c.accent} />}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:18,flexWrap:"wrap"}}>
              {Object.entries(typeColors).map(([type,c]) => (
                <div key={type} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,letterSpacing:1,color:"#444"}}>
                  <div style={{width:7,height:7,background:c.accent,borderRadius:1,flexShrink:0}}/>
                  {type.toUpperCase()}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── MEALS ── */}
        {activeTab === "meals" && (
          <div>
            <div style={{background:"#0e0e14",border:"1px solid #1a1a1a",borderRadius:6,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"48px 1fr 1fr 1fr 72px",background:"#111",padding:"10px 14px",fontSize:9,letterSpacing:2,color:"#555"}}>
                <div>DAY</div><div>BREAKFAST</div><div>LUNCH</div><div>DINNER</div><div style={{textAlign:"right"}}>PROTEIN</div>
              </div>
              {mealPlan.map((row,i) => (
                <div key={row.day}>
                  <div className={`meal-row${expandedMeal===i?" open":""}`} onClick={() => setExpandedMeal(expandedMeal===i?null:i)}
                    style={{display:"grid",gridTemplateColumns:"48px 1fr 1fr 1fr 72px",padding:"12px 14px",alignItems:"center"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:expandedMeal===i?"#e94560":"#fff"}}>{row.day}</div>
                    <div style={{fontSize:10,color:"#aaa",paddingRight:8,lineHeight:1.4}}>{row.breakfast}</div>
                    <div style={{fontSize:10,color:"#aaa",paddingRight:8,lineHeight:1.4}}>{row.lunch}</div>
                    <div style={{fontSize:10,color:"#aaa",paddingRight:8,lineHeight:1.4}}>{row.dinner}</div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:14,fontWeight:500,color:"#e94560"}}>{row.protein}g</div>
                      <div className="pbar"><div className="pfill" style={{width:`${(row.protein/200)*100}%`}}/></div>
                    </div>
                  </div>
                  {expandedMeal===i && (
                    <div style={{padding:"0 14px 14px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      {[["🌅 B/FAST",row.breakfast],["☀️ LUNCH",row.lunch],["🌙 DINNER",row.dinner]].map(([lbl,meal]) => (
                        <div key={lbl} style={{background:"#111",borderRadius:4,padding:"10px 10px"}}>
                          <div style={{fontSize:9,letterSpacing:2,color:"#555",marginBottom:5}}>{lbl}</div>
                          <div style={{fontSize:11,color:"#ddd",lineHeight:1.5}}>{meal}</div>
                        </div>
                      ))}
                      <div style={{gridColumn:"1/-1",background:"rgba(233,69,96,0.06)",border:"1px solid rgba(233,69,96,0.15)",borderRadius:4,padding:"8px 10px",fontSize:10,color:"#e94560",letterSpacing:1}}>
                        + Orgain shake (2 scoops) + Clif bar · ~60g protein daily
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
            <div style={{marginTop:10,fontSize:10,letterSpacing:1,color:"#555",textAlign:"center"}}>TAP ROW TO EXPAND · 180–200G PROTEIN · ~2,500 CAL</div>
          </div>
        )}

        {/* ── GROCERY ── */}
        {activeTab === "grocery" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#fff"}}>SHOPPING LIST</div>
                <div style={{fontSize:10,letterSpacing:2,color:"#555",marginTop:2}}>WEEK 1 MEAL PREP</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:26,fontWeight:500,color:checkedCount===totalItems?"#4caf50":"#e94560"}}>
                  {checkedCount}<span style={{fontSize:14,color:"#555"}}>/{totalItems}</span>
                </div>
                <div style={{fontSize:9,letterSpacing:2,color:"#555"}}>CHECKED</div>
                <div onClick={resetGrocery} style={{fontSize:9,letterSpacing:1,color:"#333",marginTop:4,cursor:"pointer",textDecoration:"underline"}}>RESET</div>
              </div>
            </div>
            <div style={{height:3,background:"#111",borderRadius:2,marginBottom:20,overflow:"hidden"}}>
              <div style={{height:"100%",background:"linear-gradient(90deg,#e94560,#ff6b6b)",width:`${(checkedCount/totalItems)*100}%`,transition:"width 0.3s"}}/>
            </div>
            {Object.entries(groceryList).map(([cat,items]) => {
              const catDone = items.filter(it => checked[`${cat}::${it}`]).length;
              return (
                <div key={cat} style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:11,letterSpacing:3,color:"#e94560",fontWeight:500}}>{cat.toUpperCase()}</div>
                    <div style={{fontSize:10,color:"#444"}}>{catDone}/{items.length}</div>
                  </div>
                  <div style={{background:"#0e0e14",border:"1px solid #1a1a1a",borderRadius:6,padding:"0 14px"}}>
                    {items.map((item,i) => {
                      const k = `${cat}::${item}`;
                      const on = checked[k];
                      return (
                        <div key={i} className={`g-item${on?" done":""}`} onClick={() => toggleItem(cat,item)}>
                          <div className={`cb${on?" on":""}`}>
                            {on && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <div style={{fontSize:13,color:on?"#333":"#ccc"}}>{item}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {checkedCount===totalItems && (
              <div style={{textAlign:"center",padding:20,background:"rgba(45,90,39,0.15)",border:"1px solid rgba(45,90,39,0.3)",borderRadius:6,fontSize:12,letterSpacing:2,color:"#4caf50"}}>
                ✓ ALL ITEMS CHECKED · YOU'RE READY TO PREP
              </div>
            )}
            <div style={{marginTop:14,background:"#0e0e14",border:"1px solid #1a1a1a",borderRadius:6,padding:14}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#555",marginBottom:8}}>SUNDAY MEAL PREP</div>
              {["Grill or bake: 4 chicken breasts + 2 salmon fillets","Brown: 1.5 lbs ground turkey","Hard boil: 12 eggs","Cook: 3 cups dry rice + 1 cup dry quinoa","Roast: 2 trays mixed veg (broccoli, peppers, zucchini)","Roast: 4 sweet potatoes","Mid-week refresh Wed/Thu: fresh salmon + chicken thighs"].map((note,i,arr) => (
                <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<arr.length-1?"1px solid #111":"none"}}>
                  <div style={{color:"#e94560",fontSize:10,flexShrink:0}}>{i+1}.</div>
                  <div style={{fontSize:11,color:"#888",lineHeight:1.4}}>{note}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
